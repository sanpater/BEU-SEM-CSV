<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEU Student Marks Digital Portal</title>
    <!-- Tabler CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler-vendors.min.css" rel="stylesheet">
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="page">
    <!-- Navbar -->
    <header class="navbar navbar-expand-md d-print-none">
        <div class="container-xl">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu" aria-controls="navbar-menu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3">
                <a href="." class="d-flex align-items-center gap-2 text-decoration-none">
                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px;">
                        <i class="ti ti-building-bank fs-3"></i>
                    </div>
                    BEU Marks Portal
                </a>
            </h1>
            <div class="navbar-nav flex-row order-md-last">
                <div class="d-flex">
                    <a href="?theme=dark" class="nav-link px-0 hide-theme-dark" id="themeToggleDark" data-bs-toggle="tooltip" data-bs-placement="bottom" aria-label="Enable dark mode" data-bs-original-title="Enable dark mode">
                        <i class="ti ti-moon fs-2"></i>
                    </a>
                    <a href="?theme=light" class="nav-link px-0 hide-theme-light" id="themeToggleLight" data-bs-toggle="tooltip" data-bs-placement="bottom" aria-label="Enable light mode" data-bs-original-title="Enable light mode">
                        <i class="ti ti-sun fs-2"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl mt-4 main-content">

        <!-- Statistics Dashboard -->
        <div class="row row-deck row-cards mb-4" id="statsDashboard">
            <div class="col-sm-6 col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="subheader text-uppercase text-muted">Total Students</div>
                            <div class="ms-auto lh-1">
                                <span class="badge bg-blue-lt"><i class="ti ti-users"></i></span>
                            </div>
                        </div>
                        <div class="d-flex align-items-baseline mt-3">
                            <div class="h1 mb-0 me-2" id="statTotal">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="subheader text-uppercase text-muted">Pass Rate</div>
                            <div class="ms-auto lh-1">
                                <span class="badge bg-green-lt"><i class="ti ti-chart-pie"></i></span>
                            </div>
                        </div>
                        <div class="d-flex align-items-baseline mt-3">
                            <div class="h1 mb-0 me-2" id="statPassRate">0%</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="subheader text-uppercase text-muted">Avg SGPA/CGPA</div>
                            <div class="ms-auto lh-1">
                                <span class="badge bg-purple-lt"><i class="ti ti-award"></i></span>
                            </div>
                        </div>
                        <div class="d-flex align-items-baseline mt-3">
                            <div class="h1 mb-0 me-2" id="statAvgSgpa">0.00</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Controls -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i class="ti ti-filter me-2 text-primary"></i> Find Your Results</h3>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">Search</label>
                                <div class="input-icon">
                                    <span class="input-icon-addon">
                                        <i class="ti ti-search"></i>
                                    </span>
                                    <input type="text" id="searchInput" class="form-control" placeholder="Reg No / Name">
                                </div>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Batch</label>
                                <select id="batchFilter" class="form-select">
                                    <option value="">All Batches</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Semester</label>
                                <select id="semesterFilter" class="form-select">
                                    <option value="">All Semesters</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">College</label>
                                <select id="collegeFilter" class="form-select">
                                    <option value="">All Colleges</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Branch</label>
                                <select id="branchFilter" class="form-select">
                                    <option value="">All Branches</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Sort</label>
                                <select id="sortFilter" class="form-select">
                                    <option value="name_asc">Name (A-Z)</option>
                                    <option value="sgpa_desc">Highest SGPA</option>
                                    <option value="sgpa_asc">Lowest SGPA</option>
                                </select>
                            </div>
                            <div class="col-md-12 d-flex justify-content-end">
                                <button id="searchBtn" class="btn btn-primary"><i class="ti ti-check me-2"></i> Apply</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="text-center py-5 d-none">
            <div class="spinner-border text-primary" role="status"></div>
            <div class="mt-3 text-muted">Loading massive student database...</div>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="alert alert-danger alert-important d-none" role="alert">
            <div class="d-flex">
                <div><i class="ti ti-alert-triangle icon alert-icon"></i></div>
                <div>
                    <h4 class="alert-title">Error</h4>
                    <div id="errorText" class="text-muted"></div>
                </div>
            </div>
        </div>

        <!-- Results Area -->
        <div id="resultsArea" class="row g-4 mb-4">
            <!-- Student cards will be injected here -->
        </div>

        <!-- Pagination -->
        <nav aria-label="Page navigation" class="mt-4 mb-5" id="paginationNav" style="display: none;">
            <ul class="pagination pagination-lg justify-content-center shadow-sm" id="paginationList">
                <!-- Pagination injected here -->
            </ul>
        </nav>

        <!-- Footer Info -->
        <div class="text-center text-muted mb-5 small pb-4">
            Data sourced from BEU API &bull; <span id="totalRecords" class="fw-bold text-primary">0</span> records loaded.
        </div>

            </div>
        </div>
    </div>
</div>

    <!-- Student Detail Modal -->
    <div class="modal modal-blur fade" id="studentModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable" role="document">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white d-print-none">
                    <div class="d-flex align-items-center w-100">
                        <span class="avatar bg-white text-primary me-3"><i class="ti ti-school fs-3"></i></span>
                        <div>
                            <h5 class="modal-title" id="modalTitle">Student Marksheet</h5>
                            <div class="text-white-50 small">Digital Academic Record</div>
                        </div>
                        <div class="ms-auto d-flex gap-2">
                            <button class="btn btn-primary d-none d-sm-flex" onclick="window.print()">
                                <i class="ti ti-printer me-2"></i> Print
                            </button>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                    </div>
                </div>
                <div class="modal-body p-0" id="modalBody">
                    <!-- Detail injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
